*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);font-size:13px;color:var(--color-text-primary)}
.header{padding:1rem 1.25rem 0.75rem;border-bottom:0.5px solid var(--color-border-tertiary)}

.title{font-size:15px;font-weight:500}

.badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info)}

.print-btn:hover{background:var(--color-background-secondary)}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.stat{background:var(--color-background-secondary);border-radius:6px;padding:8px 10px}
.stat-v{font-size:18px;font-weight:500}
.stat-l{font-size:10px;color:var(--color-text-secondary);margin-top:1px}

.body{padding:0 0 2rem}

.section{margin:0;border-bottom:0.5px solid var(--color-border-tertiary)}
.section-hdr{padding:10px 1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none}

.section-label{display:flex;align-items:center;gap:10px}
.section-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.section-info{}
.section-title{font-size:12px;font-weight:500}

.chev{font-size:10px;color:var(--color-text-secondary);transition:transform .2s}

.section-body{display:none;padding:0 1.25rem 14px}

.q-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:9px;padding:1px 6px;border-radius:10px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.tag-req{background:var(--color-background-danger,#FCEBEB);color:var(--color-text-danger,#791F1F);border-color:transparent}
.tag-pref{background:var(--color-background-warning,#FAEEDA);color:var(--color-text-warning,#633806);border-color:transparent}
.tag-info{background:var(--color-background-info,#E6F1FB);color:var(--color-text-info,#0C447C);border-color:transparent}

function applyFilter(){
  const sf=document.getElementById("secFilter").value;
  const cf=document.getElementById("countryFilter").value;
  let visibleSections=SECTIONS.filter(s=>{
    if(sf!=="all" && s.id!==sf) return false;
    if(cf!=="all" && s.id!=="country") return sf==="country"?false:true;
    return true;
  });
  if(cf!=="all"){
    visibleSections=SECTIONS.filter(s=>s.id==="country");
  }
  if(sf==="country"||cf!=="all"){
    visibleSections=SECTIONS.filter(s=>s.id==="country");
  }
  renderSections(visibleSections,cf);
}

function renderSections(sections,countryFilter){
  const body=document.getElementById("body");
  let totalQ=0,totalReq=0,totalSec=0,allCats=new Set();

  body.innerHTML=sections.map((sec,si)=>{
    let groups=sec.groups;
    if(countryFilter!=="all" && sec.id==="country"){
      const cmap={china:"C1",germany:"C2",japan:"C3",southkorea:"C4",taiwan:"C5",switzerland:"C6",canada:"C7",uk:"C8",australia:"C9",eu:"C10"};
      const prefix=cmap[countryFilter]||"";
      groups=groups.filter(g=>g.cat.startsWith(prefix+"·")||g.cat.includes(prefix+" ·"));
    }

    let secQ=0,secReq=0;
    const groupsHTML=groups.map((g,gi)=>{
      allCats.add(sec.id);
      const qHTML=g.qs.map((q,qi)=>{
        secQ++;totalQ++;
        const isReq=q.tags.some(t=>t==="Required");
        if(isReq){secReq++;totalReq++;}
        const tagHTML=q.tags.map(t=>{
          const cls=t==="Required"?"tag-req":t==="Preferred"?"tag-pref":"tag-info";
          return `<span class="tag ${cls}">${t}</span>`;
        }).join("");
        return `<li class="q-item">
          <span class="q-num">${q.n}</span>
          <div class="q-text">
            ${q.text}
            <div class="q-tags">${tagHTML}</div>
          </div>
        </li>`;
      }).join("");
      return `<div class="q-block">
        <div class="q-category"><span class="q-cat-dot" style="background:${g.dot}"></span>${g.cat}</div>
        <ul class="q-list">${qHTML}</ul>
      </div>`;
    }).join("");

    totalSec++;
    const bodyId=`sb-${si}`;
    const chevId=`sc-${si}`;
    return `<div class="section">
      <div class="section-hdr" onclick="toggleSec('${bodyId}','${chevId}')">
        <div class="section-label">
          <div class="section-icon" style="background:${sec.bg};color:${sec.color}">${sec.icon}</div>
          <div class="section-info">
            <div class="section-title">${sec.title}</div>
            <div class="section-sub">${sec.sub}</div>
          </div>
        </div>
        <div class="section-meta">
          <span class="q-count">${groups.reduce((a,g)=>a+g.qs.length,0)} questions</span>
          <span class="chev ${si===0?'open':''}" id="${chevId}">▶</span>
        </div>
      </div>
      <div class="section-body ${si===0?'open':''}" id="${bodyId}">${groupsHTML}</div>
    </div>`;
  }).join("");

  document.getElementById("st-q").textContent=totalQ;
  document.getElementById("st-req").textContent=totalReq;
  document.getElementById("st-sec").textContent=totalSec;
  document.getElementById("st-cat").textContent=allCats.size;
}

function toggleSec(bid,cid){
  document.getElementById(bid).classList.toggle("open");
  document.getElementById(cid).classList.toggle("open");
}

// Init
renderSections(SECTIONS,"all");
</script>
