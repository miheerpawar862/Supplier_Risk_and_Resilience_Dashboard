.stat{background:var(--color-background-secondary);border-radius:6px;padding:8px 10px}

.stat-l{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:520px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead th{padding:7px 10px;text-align:left;font-weight:500;font-size:10px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);position:sticky;top:0;z-index:2;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--color-text-primary)}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary)}
tbody tr:hover{background:var(--color-background-secondary)}
td{padding:7px 10px;vertical-align:middle;color:var(--color-text-primary)}
.comp-id{font-family:var(--font-mono,monospace);font-size:10px;color:var(--color-text-secondary)}
.comp-name{font-weight:500;font-size:12px;max-width:160px}
.sup-name{font-weight:500;max-width:130px}
.flag{font-size:13px;margin-right:3px}
.country-cell{white-space:nowrap}
.badge{display:inline-block;font-size:9px;font-weight:500;padding:2px 6px;border-radius:10px;white-space:nowrap}
.geo-h{background:#FCEBEB;color:#791F1F}.geo-m{background:#FAEEDA;color:#633806}.geo-l{background:#EAF3DE;color:#27500A}
.crit-h{color:#A32D2D;font-weight:600}.crit-m{color:#854F0B;font-weight:600}.crit-l{color:#3B6D11;font-weight:600}
.platform-chip{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);margin:1px}
.stars{color:#BA7517;font-size:11px}
.note-cell{font-size:10px;color:var(--color-text-secondary);max-width:200px;line-height:1.4}
.footer{padding:8px 14px;font-size:10px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary)}
</style>

function stars(q){return "★".repeat(q)+"☆".repeat(5-q)}
function geoClass(g){return g==="High"?"geo-h":g==="Medium"?"geo-m":"geo-l"}
function critClass(c){return c==="High"?"crit-h":c==="Med"?"crit-m":"crit-l"}

function applyFilters(){
  const s=document.getElementById("search").value.toLowerCase();
  const cf=document.getElementById("catF").value;
  const cr=document.getElementById("critF").value;
  const gf=document.getElementById("geoF").value;
  const pf=document.getElementById("platF").value;
  let rows=D.filter(r=>{
    if(s && !([r.comp,r.sup,r.country,r.cat,r.note].join(" ").toLowerCase().includes(s)))return false;
    if(cf && r.cat!==cf)return false;
    if(cr && r.crit!==cr)return false;
    if(gf && r.geo!==gf)return false;
    if(pf==="P1" && !r.plat.includes("P1"))return false;
    if(pf==="P2" && !r.plat.includes("P2"))return false;
    return true;
  });
  renderRows(rows);
}

function renderRows(rows){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML=rows.map(r=>`
    <tr>
      <td class="comp-id">${r.id}</td>
      <td class="comp-name">${r.comp}</td>
      <td><span style="font-size:10px;color:var(--color-text-secondary)">${r.cat}</span></td>
      <td><span class="platform-chip">${r.plat}</span></td>
      <td class="sup-name">${r.flag} ${r.sup}</td>
      <td class="country-cell">${r.country}</td>
      <td style="font-size:10px;color:var(--color-text-secondary)">${r.cont}</td>
      <td><span class="badge ${geoClass(r.geo)}">${r.geo}</span></td>
      <td><span class="stars">${stars(r.q)}</span></td>
      <td style="white-space:nowrap;font-size:11px">${r.price}</td>
      <td style="white-space:nowrap;font-size:11px">${r.moq}</td>
      <td style="white-space:nowrap;font-size:11px">${r.aec}</td>
      <td style="white-space:nowrap;font-size:11px">${r.lt}</td>
      <td style="font-size:11px;font-weight:500;color:${r.ndaa==="Yes"?"var(--color-text-success)":"var(--color-text-danger)"}">${r.ndaa}</td>
      <td class="note-cell">${r.note}</td>
    </tr>
  `).join("");

  const countries=new Set(rows.map(r=>r.country)).size;
  const highgeo=rows.filter(r=>r.geo==="High").length;
  const us=rows.filter(r=>r.country==="USA").length;
  const comps=new Set(rows.map(r=>r.id)).size;
  document.getElementById("st-rows").textContent=rows.length;
  document.getElementById("st-comps").textContent=comps;
  document.getElementById("st-countries").textContent=countries;
  document.getElementById("st-highgeo").textContent=highgeo;
  document.getElementById("st-us").textContent=us;
  document.getElementById("footer").textContent=`Showing ${rows.length} of ${D.length} supplier rows · ${comps} components · Lead times are ship time to San Francisco, CA · Pricing = market proxy from Digi-Key, Mouser, manufacturer websites, and industry reports. Annual contract estimates assume 500-unit drone fleet. Data accurate as of 2025–2026.`;
}
